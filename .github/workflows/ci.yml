name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup VSTest
        uses: darenm/Setup-VSTest@v1

      - name: Restore NuGet packages
        run: nuget restore SlingMD.sln

      - name: Build (Release)
        run: msbuild SlingMD.sln /p:Configuration=Release /p:SignManifests=false /p:ManifestCertificateThumbprint= /p:ManifestKeyFile= /v:minimal /nologo

      - name: Run tests
        run: vstest.console.exe SlingMD.Tests\bin\Release\SlingMD.Tests.dll /Logger:console
